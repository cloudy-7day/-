name: Daily article update

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force a full regeneration even when today is complete
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-update.yml"
      - "scripts/update-daily.ps1"
      - "scripts/daily-update-support.ps1"
      - "scripts/news-selection.ps1"
      - "scripts/test-news-selection.ps1"
  pull_request:
    paths:
      - ".github/workflows/daily-update.yml"
      - "scripts/**"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "site-core.js"
      - "data/**"
      - "PROJECT_CONTEXT.md"
      - "CHANGELOG.md"
  schedule:
    # PDT: 08:07, 09:07, 10:07; PST: 07:07 (script skips), 08:07, 09:07.
    - cron: "7 15,16,17 * * *"

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: daily-article-validation-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF extraction dependency
        shell: bash
        run: python -m pip install pypdf==6.10.2

      - name: Run PowerShell validation
        shell: pwsh
        run: |
          ./scripts/test-news-selection.ps1
          ./scripts/test-ai-selection.ps1
          ./scripts/test-paper-selection.ps1
          ./scripts/test-update-daily-rules.ps1
          ./scripts/test-daily-update-support.ps1
          ./scripts/test-published-data.ps1
          ./scripts/test-translation.ps1
          ./scripts/test-app-contract.ps1
          ./scripts/test-site-shell.ps1
          ./scripts/test-visual-contract.ps1

      - name: Run Node validation
        shell: bash
        run: |
          node scripts/test-site-core.js
          node scripts/test-frontend-language.js

  update:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      models: read
    concurrency:
      group: daily-article-update
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF extraction dependency
        shell: bash
        run: python -m pip install pypdf==6.10.2

      - name: Test news selection
        shell: pwsh
        run: ./scripts/test-news-selection.ps1

      - name: Test daily update rules
        shell: pwsh
        run: ./scripts/test-update-daily-rules.ps1

      - name: Update articles
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $force = "${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.force }}" -eq "true"
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              ./scripts/update-daily.ps1 -ForceRefresh $force
              exit 0
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Warning "Update attempt $attempt failed: $($_.Exception.Message)"
              Write-Host "Retrying once after 30 seconds."
              Start-Sleep -Seconds 30
            }
          }

      - name: Commit updated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/archive
          if git diff --cached --quiet; then
            echo "No article changes to commit."
          else
            git commit -m "Daily article update"
            git push
          fi
