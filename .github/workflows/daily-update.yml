name: Daily article update

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force a full regeneration even when today is complete
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-update.yml"
      - "scripts/update-daily.ps1"
      - "scripts/daily-update-support.ps1"
  schedule:
    # PDT: 08:07, 09:07, 10:07; PST: 07:07 (script skips), 08:07, 09:07.
    - cron: "7 15,16,17 * * *"

permissions:
  contents: write
  models: read

concurrency:
  group: daily-article-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF extraction dependency
        shell: bash
        run: python -m pip install pypdf==6.10.2

      - name: Test daily update rules
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/test-update-daily-rules.ps1

      - name: Update articles
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $force = "${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.force }}" -eq "true"
          $maxAttempts = 2
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              ./scripts/update-daily.ps1 -ForceRefresh $force
              exit 0
            } catch {
              if ($attempt -eq $maxAttempts) {
                throw
              }
              Write-Warning "Update attempt $attempt failed: $($_.Exception.Message)"
              Write-Host "Retrying once after 30 seconds."
              Start-Sleep -Seconds 30
            }
          }

      - name: Commit updated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/archive
          if git diff --cached --quiet; then
            echo "No article changes to commit."
          else
            git commit -m "Daily article update"
            git push
          fi
