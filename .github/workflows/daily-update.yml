name: Daily article update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15,16 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Los Angeles time
        id: timecheck
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "should_run=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $tz = [System.TimeZoneInfo]::FindSystemTimeZoneById("America/Los_Angeles")
          $laNow = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $tz)
          if ($laNow.Hour -eq 8) {
            "should_run=true" >> $env:GITHUB_OUTPUT
          } else {
            "should_run=false" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping because Los Angeles time is $($laNow.ToString('yyyy-MM-dd HH:mm:ss'))."
          }

      - name: Update articles
        if: steps.timecheck.outputs.should_run == 'true'
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: ./scripts/update-daily.ps1

      - name: Commit updated data
        if: steps.timecheck.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/archive
          if git diff --cached --quiet; then
            echo "No article changes to commit."
          else
            git commit -m "Daily article update"
            git push
          fi
