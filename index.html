<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#eae7e1">
    <meta name="description" content="山海经的漏网之鱼：每日七篇异闻、机巧与格物手稿。">
    <title>山海经的漏网之鱼</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header id="site-header" class="site-header">
      <a class="site-mark" href="#/home" aria-label="返回首页">山海经的漏网之鱼</a>
      <span class="site-motto">闻一之间的空间</span>
      <div class="site-tools">
        <span id="clock" aria-label="洛杉矶时间"></span>
        <span class="language-toggle" aria-label="语言切换">
          <button type="button" data-language="zh" aria-pressed="true">中文</button>
          <span aria-hidden="true">/</span>
          <button type="button" data-language="en" aria-pressed="false">EN</button>
        </span>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换明暗主题">◐</button>
      </div>
    </header>

    <main id="app" tabindex="-1">
      <noscript>请启用 JavaScript 查看每日策展内容。</noscript>
    </main>
    <p id="route-status" class="sr-only" aria-live="polite"></p>

    <script src="site-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>
